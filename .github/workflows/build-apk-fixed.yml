name: Build APK (Fixed)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    # 将 AAR 文件从 OUIConversation 复制到 OUIRecordLib
    - name: Setup AAR dependencies
      run: |
        mkdir -p OUIKit/OUIRecordLib/libs
        cp OUIKit/OUIConversation/libs/*.aar OUIKit/OUIRecordLib/libs/ 2>/dev/null || true
        ls -la OUIKit/OUIRecordLib/libs/

    - name: Grant execute permission for gradlew
      run: chmod +x Demo/gradlew

    - name: Build Debug APK
      run: |
        cd Demo
        ./gradlew assembleDebug --no-daemon --stacktrace

    - name: Build Release APK
      run: |
        cd Demo
        ./gradlew assembleRelease --no-daemon --stacktrace

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: Demo/app/build/outputs/apk/debug/*.apk
        if-no-files-found: warn

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: Demo/app/build/outputs/apk/release/*.apk
        if-no-files-found: warn

    - name: Upload All Outputs
      uses: actions/upload-artifact@v4
      with:
        name: all-apk-outputs
        path: Demo/app/build/outputs/apk/**/*.apk
        if-no-files-found: warn
